<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>game filter</title>
	<link rel="stylesheet" href="../style/style.css">
    <link rel="icon" href="../images/icono/logo_FIFALICHI.ico">
</head>
<body>
	<header class="main-header">
		<div class="header-container">
			<h1>FIFALICHI</h1>
			<h2> <b class="higher_green">HIGHER</b> <b>o</b> <b><b class="lower_red">LOWER</b></b> </h2>
			<div class="logo">
				<img src="../images/logo_FIFALICHI.png" class="logo" alt="Logo de FIFALICHI">
			</div>
		</div>
	</header>
	<main class="main-filtros">
		<h3 class="filtros-title">FILTROS</h3>

		<div class="filter-buttons">
			<button class="filter-btn active" onclick="selectFilter('pais')">POR PAIS</button>
			<button class="filter-btn" onclick="selectFilter('liga')">POR LIGA</button>
			<button class="filter-btn" onclick="selectFilter('posicion')">POR POSICION</button>
		</div>

		<div id="select-container">
		
		</div>
		<button id="limpiar" onclick="LimpiarFiltro()">Limpiar</button>
	</main>
	
	<div class="volver-container">
    	<a href="menu.html" class="btn btn-blanco">
        	← Volver al menú
    	</a>
	</div>

	<footer>
		<hr>
		<h4>pagina oficial de FIFALICHI © | <strong>FIFALICHI</strong> <b class="h_green">H</b>o<b class="l_red">L</b> | Borda, Garcea, Piscolichi y Rey</h4>
	</footer>
	<script src="../script/index.js"></script>
</body>
</html>
