<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>game mode</title>
	<link rel="stylesheet" href="../style/style.css">
    <link rel="icon" href="../images/icono/logo_FIFALICHI.ico">
</head>
<body>
	<header class="main-header">
		<div class="header-container">
			<h1>FIFALICHI</h1>
			<h2> <b class="higher_green">HIGHER</b> <b>o</b> <b><b class="lower_red">LOWER</b></b> </h2>
			<div class="logo">
				<img src="../images/logo_FIFALICHI.png" class="logo" alt="Logo de FIFALICHI">
			</div>
		</div>
	</header>
	<main class="main-modo">
		<select name="modo" id="select-modo">
			<option value="">Elegir</option>
			<option value="tiro">Tiro</option>
			<option value="pase">Pase</option>
			<option value="ritmo">Ritmo</option>
			<option value="fisico">Fisico</option>
			<option value="defensa">Defensa</option>
			<option value="regate">Regate</option>
			<option value="estatura">Altura</option>
			<option value="peso">Peso</option>
		</select>
		<div class="modo-botones">
			<button id="btn-modo" onclick="aceptarModo()">Aceptar</button>
			<button id="limpiar-modo" onclick="limpiarModo()">Limpiar</button>
		</div>
		
	</main>
	
	<div class="volver-container">
    	<a href="menu.html" class="btn btn-blanco">
        	← Volver al menú
    	</a>
	</div>

	<footer>
		<hr>
		<h4>pagina oficial de FIFALICHI © | <strong>FIFALICHI</strong> <b class="h_green">H</b>o<b class="l_red">L</b> | Borda, Garcea, Piscolichi y Rey</h4>
	</footer>
	<script src="../script/index.js"></script>
</body>
</html>
