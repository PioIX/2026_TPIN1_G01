<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>game</title>
	<link rel="stylesheet" href="../style/style.css">
    <link rel="icon" href="../images/icono/logo_FIFALICHI.ico">
</head>
<body>
	<header class="main-header">
		<div class="header-container">
			<h1>FIFALICHI</h1>
			<h2> <b class="higher_green">HIGHER</b> <b>o</b> <b><b class="lower_red">LOWER</b></b> </h2>
			<div class="logo">
				<img src="../images/logo_FIFALICHI.png" class="logo" alt="Logo de FIFALICHI">
			</div>
		</div>
	</header>
<main class="main-game">
    <div class="player-card">
		<p class="player-text" id="name1"></p>
        <img src="" alt="Jugador 1" class="player-img" id="img_player1" referrerpolicy="no-referrer">
        <p class="player-text" id="stat1">Nombre del jugador 1</p>
		<button id="btn-jugador1" >Elegir</button>
    </div>

    <div class="player-card">
		<p class="player-text" id="name2"></p>
        <img src="" alt="Jugador 2" class="player-img" id="img_player2" referrerpolicy="no-referrer">
        <p class="player-text" id="stat2">Nombre del jugador 2</p>
		<button id="btn-jugador2">Elegir</button>
    </div>

	<div id="mensaje">
		<h2 id="txt-msj"></h2>
	</div>
	<div id="resultado-panel" class="resultado-panel" hidden>
		<h2 class="resultado-titulo">Resultado Final</h2>
		<p id="puntaje-txt" class="puntaje-display"></p>
		<div class="resultado-botones">
			<button class="btn btn-blanco" id="btn-guardar" onclick="guardarPuntaje()">Guardar puntaje</button>
			<a id="btn-salir" class="btn btn-blanco" href="menu.html">Salir</a>
		</div>
	</div>

</main>
	
	<footer>
		<hr>
		<h4>pagina oficial de FIFALICHI © | <strong>FIFALICHI</strong> <b class="h_green">H</b>o<b class="l_red">L</b> | Borda, Garcea, Piscolichi y Rey</h4>
	</footer>
	<script src="/Front/script/index.js"></script>
	<script src="/Front/script/juego.js"></script>
	<script src="/Front/script/dom.js"></script>
</body>
</html>
